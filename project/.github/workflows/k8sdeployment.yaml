name: Build and Deploy

on:
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1

jobs:

#############################################################
# Checkout
#############################################################

  checkout:

    runs-on: ubuntu-latest

    steps:

      - uses: actions/checkout@v4

#############################################################
# Configure AWS
#############################################################

  configure-aws:

    runs-on: ubuntu-latest

    needs: checkout

    outputs:
      registry: ${{ steps.login-ecr.outputs.registry }}

    steps:

      - uses: actions/checkout@v4

      - name: Configure AWS Credentials

        uses: aws-actions/configure-aws-credentials@v4

        with:

          role-to-assume: ${{ secrets.ROLE_TO_ASSUME }}

          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR

        id: login-ecr

        uses: aws-actions/amazon-ecr-login@v2

#############################################################
# Build Backend
#############################################################

  build-backend:

    needs: configure-aws

    runs-on: ubuntu-latest

    steps:

      - uses: actions/checkout@v4

      - name: Configure AWS

        uses: aws-actions/configure-aws-credentials@v4

        with:

          role-to-assume: ${{ secrets.ROLE_TO_ASSUME }}

          aws-region: us-east-1

      - uses: aws-actions/amazon-ecr-login@v2

      - name: Build Backend

        run: |

          docker build \
          -t ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/backend:${{ github.run_number }} \
          ./project/backend

#############################################################
# Build Frontend
#############################################################

  build-frontend:

    needs: configure-aws

    runs-on: ubuntu-latest

    steps:

      - uses: actions/checkout@v4

      - name: Configure AWS

        uses: aws-actions/configure-aws-credentials@v4

        with:

          role-to-assume: ${{ secrets.ROLE_TO_ASSUME }}

          aws-region: us-east-1

      - uses: aws-actions/amazon-ecr-login@v2

      - name: Build Frontend

        run: |

          docker build \
          -t ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/frontend:${{ github.run_number }} \
          ./project/frontend

#############################################################
# Trivy Scan
#############################################################

  trivy:

    needs:

      - build-backend

      - build-frontend

    runs-on: ubuntu-latest

    steps:

      - uses: aquasecurity/trivy-action@master

        with:

          image-ref: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/backend:${{ github.run_number }}

          severity: HIGH,CRITICAL

          exit-code: '1'

      - uses: aquasecurity/trivy-action@master

        with:

          image-ref: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/frontend:${{ github.run_number }}

          severity: HIGH,CRITICAL

          exit-code: '1'

#############################################################
# Push Images
#############################################################

  push:

    needs:

      - trivy

    runs-on: ubuntu-latest

    steps:

      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4

        with:

          role-to-assume: ${{ secrets.ROLE_TO_ASSUME }}

          aws-region: us-east-1

      - uses: aws-actions/amazon-ecr-login@v2

      - run: |

          docker push ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/backend:${{ github.run_number }}

          docker push ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/frontend:${{ github.run_number }}

#############################################################
# Deploy
#############################################################

  deploy:

    needs:

      - push

    runs-on: ubuntu-latest

    environment:

      name: production

    steps:

      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4

        with:

          role-to-assume: ${{ secrets.ROLE_TO_ASSUME }}

          aws-region: us-east-1

      - name: Update kubeconfig

        run: |

          aws eks update-kubeconfig \
          --region us-east-1 \
          --name my-eks-cluster

      - name: Deploy

        run: |

          kubectl apply -f project/k8s/db-deployment.yaml

          kubectl apply -f project/k8s/backend-deployment.yaml

          kubectl apply -f project/k8s/frontend-deployment.yaml

          kubectl set image deployment/backend \
          backend=${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/backend:${{ github.run_number }}

          kubectl set image deployment/frontend \
          frontend=${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/frontend:${{ github.run_number }}

