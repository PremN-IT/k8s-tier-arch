apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: backend
  namespace: argocd          # Applications live in the argocd namespace
spec:
  project: default
  source:
    repoURL: https://github.com/PremN-IT/k8s-tier-arch.git
    path: project/charts/backend
    targetRevision: main
    helm:
      valueFiles:
        - values.yaml
  destination:
    server: https://kubernetes.default.svc   # this same cluster
    namespace: studentmgmt
  syncPolicy:
    automated:
      prune: true            # delete resources removed from Git
      selfHeal: true         # revert manual (out-of-band) changes back to Git state
    syncOptions:
      - CreateNamespace=true