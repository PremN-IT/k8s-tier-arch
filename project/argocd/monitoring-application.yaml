apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: monitoring
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://prometheus-community.github.io/helm-charts
    chart: kube-prometheus-stack
    targetRevision: 87.16.1          # pin a real chart version — see Step 3
    helm:
      releaseName: kube-prometheus-stack
      values: |
        grafana:
          adminPassword: ""          # leave empty; wire via secret — see note
          service:
            type: ClusterIP          # expose via your ALB Ingress, not LoadBalancer
        prometheus:
          prometheusSpec:
            retention: 15d
            storageSpec:
              volumeClaimTemplate:
                spec:
                  storageClassName: gp3      # your EBS CSI StorageClass
                  accessModes: ["ReadWriteOnce"]
                  resources:
                    requests:
                      storage: 20Gi
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true          # handles the large CRDs cleanly